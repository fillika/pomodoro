name: Release

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev mingw-w64

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build Windows
        run: wails build -platform windows/amd64

      - name: Build Linux
        run: wails build -platform linux/amd64 -tags webkit2_41

      - name: Rename artifacts
        run: |
          mv build/bin/pomodoro.exe build/bin/pomo-windows-amd64.exe
          mv build/bin/pomodoro    build/bin/pomo-linux-amd64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          files: |
            build/bin/pomo-windows-amd64.exe
            build/bin/pomo-linux-amd64
